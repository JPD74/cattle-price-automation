name: Daily Cattle Price Data Collection

# Runs daily at 9 AM UTC (covers all target countries during business hours)
on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  collect_cattle_prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Cleanup old NULL records
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python cleanup_old_records.py

      - name: Upload Brazil CEPEA cattle prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python upload_brazil_cepea.py

      - name: Upload New Zealand cattle prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python upload_newzealand.py

      - name: Upload Australian cattle prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python upload_australia.py

      - name: Upload Paraguay cattle prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python upload_paraguay.py

      - name: Upload Uruguay cattle prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python upload_uruguay.py

      - name: Upload Argentina cattle prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python upload_argentina.py

      - name: Upload USA cattle prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python upload_usa.py

      - name: Upload crop prices (all countries)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python upload_crops.py

      # === LIVE SCRAPERS ===
      - name: Live scrape USA (USDA LMR Datamart)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scrape_live_usa.py

      - name: Live scrape Brazil (CEPEA/ESALQ)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scrape_live_brazil.py

      - name: Live scrape Australia (MLA Statistics)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scrape_live_australia.py

      - name: Live scrape NZ/Paraguay/Uruguay
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scrape_live_nz_py_uy.py

      - name: Live scrape Argentina (Mercado Agroganadero)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scrape_live_argentina.py

      - name: Summary
        run: |
          echo "=== CATTLE PRICE DATA COLLECTION COMPLETE ==="
          echo "Static uploads: AU, NZ, BR, PY, UY, AR, US + Crops"
          echo "Live scrapers: USA (USDA), Brazil (CEPEA), Australia (MLA), NZ/PY/UY, Argentina (MAG)"
          echo "Database: Railway PostgreSQL"
