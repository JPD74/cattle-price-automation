name: Daily Cattle Price Data Collection

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  collect_cattle_prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Cleanup old NULL records
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python cleanup_old_records.py
      - name: Upload Brazil CEPEA
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python upload_brazil_cepea.py
      - name: Upload NZ
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python upload_newzealand.py
      - name: Upload AU
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python upload_australia.py
      - name: Upload PY
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python upload_paraguay.py
      - name: Upload UY
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python upload_uruguay.py
      - name: Upload AR
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python upload_argentina.py
      - name: Upload USA
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python upload_usa.py
      - name: Upload crops
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python upload_crops.py
      - name: Scrape USA
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrape_live_usa.py
      - name: Scrape Brazil
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrape_live_brazil.py
      - name: Scrape Australia
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrape_live_australia.py
      - name: Scrape NZ PY UY
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrape_live_nz_py_uy.py
      - name: Scrape Argentina
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrape_live_argentina.py
      - name: Update FX rates
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python fx_rates.py
      - name: Seed cost benchmarks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python seed_cost_benchmarks.py
      - name: Persist signals
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python persist_signals.py        
