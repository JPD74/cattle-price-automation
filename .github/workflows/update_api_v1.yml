name: Deploy V1 Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write V1 dashboard
        run: python3 write_dashboard.py

      - name: Inject i18n language toggle
        run: python3 inject_i18n.py

      - name: Fix dashboard - Historical Bands, Class Filter, i18n tables
        run: |
          python3 -c "
          import re
          with open('dashboard.html','r') as f: html=f.read()
          changed=False

          # FIX 1: Add Historical Bands tab if missing
          if 'tab-bands' not in html:
            # Add tab button after Market Pulse
            old_tab='data-i18n=\"tab_signals\"'
            new_tab='data-i18n=\"tab_bands\">Historical Bands</div>\n<div class=\"tab\" onclick=\"switchTab(\\x27signals\\x27)\" data-i18n=\"tab_signals\"'
            if old_tab in html:
              html=html.replace(old_tab, new_tab, 1)
            # Add tab content div before tab-signals div
            bands_html='''<div id=\"tab-bands\" class=\"tab-content\">
          <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px\">
            <label style=\"color:#94a3b8;font-size:13px\" data-i18n=\"country_label\">Country:</label>
            <select id=\"bands-country\" onchange=\"loadBands()\">
              <option value=\"AU\">Australia - EYCI</option>
              <option value=\"BR\">Brazil - Boi Gordo</option>
              <option value=\"UY\">Uruguay - Novillo</option>
              <option value=\"PY\">Paraguay - Novillo</option>
              <option value=\"NZ\">New Zealand - Prime Steer</option>
              <option value=\"US\">USA - Fed Cattle</option>
              <option value=\"AR\">Argentina - Novillo</option>
            </select>
          </div>
          <div class=\"chart-box\">
            <h3 id=\"bands-title\">Historical Price Bands (USD/kg)</h3>
            <canvas id=\"bandsChart\" height=\"400\"></canvas>
          </div>
          <div class=\"card\">
            <h3 data-i18n=\"h_bands_detail\">Price Band Statistics</h3>
            <div id=\"bands-stats\"><div class=\"loading\">Select a country to view bands</div></div>
          </div>
          </div>'''
            marker='<div id=\"tab-signals\"'
            if marker in html:
              html=html.replace(marker, bands_html+'\n'+marker, 1)
            # Add switchTab handler
            old_sw=\"if (name==='signals') loadSignals();\"
            new_sw=\"if (name==='bands') loadBands();\n    if (name==='signals') loadSignals();\"
            html=html.replace(old_sw, new_sw, 1)
            # Add loadBands JS function before // Initialize
            bands_js='''
          async function loadBands() {
            const country = document.getElementById('bands-country').value;
            try {
              const data = await fetch(API+'/prices?country='+country+'&limit=500').then(r=>r.json());
              if (!data.length) { document.getElementById('bands-stats').innerHTML='<div class=\"loading\">No data</div>'; return; }
              // Group by year
              const byYear = {};
              data.forEach(p => {
                const yr = p.date.substring(0,4);
                if (!byYear[yr]) byYear[yr]=[];
                byYear[yr].push(p.price_per_kg_usd);
              });
              const years = Object.keys(byYear).sort();
              const percentile = (arr,p) => { const s=[...arr].sort((a,b)=>a-b); const i=Math.floor(s.length*p); return s[Math.min(i,s.length-1)]; };
              const p10=years.map(y=>percentile(byYear[y],0.1));
              const p25=years.map(y=>percentile(byYear[y],0.25));
              const p50=years.map(y=>percentile(byYear[y],0.5));
              const p75=years.map(y=>percentile(byYear[y],0.75));
              const p90=years.map(y=>percentile(byYear[y],0.9));
              const avg=years.map(y=>byYear[y].reduce((a,b)=>a+b,0)/byYear[y].length);
              if (charts.bands) charts.bands.destroy();
              charts.bands = new Chart(document.getElementById('bandsChart'), {
                type:'line',
                data:{labels:years, datasets:[
                  {label:'90th',data:p90,borderColor:'rgba(239,68,68,0.3)',backgroundColor:'rgba(239,68,68,0.05)',fill:'+1',pointRadius:0},
                  {label:'75th',data:p75,borderColor:'rgba(251,191,36,0.3)',backgroundColor:'rgba(251,191,36,0.1)',fill:'+1',pointRadius:0},
                  {label:'Median',data:p50,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',fill:false,borderWidth:2,pointRadius:3},
                  {label:'25th',data:p25,borderColor:'rgba(251,191,36,0.3)',backgroundColor:'rgba(251,191,36,0.1)',fill:'+1',pointRadius:0},
                  {label:'10th',data:p10,borderColor:'rgba(239,68,68,0.3)',backgroundColor:'rgba(239,68,68,0.05)',fill:false,pointRadius:0},
                  {label:'Average',data:avg,borderColor:'#3b82f6',borderWidth:2,borderDash:[5,5],fill:false,pointRadius:2}
                ]},
                options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{y:{ticks:{color:'#64748b',callback:v=>'$'+v.toFixed(2)},grid:{color:'#1e293b'}},x:{ticks:{color:'#94a3b8'},grid:{display:false}}}}
              });
              // Stats table
              const latest=years[years.length-1];
              const lp=byYear[latest];
              const latestAvg=lp.reduce((a,b)=>a+b,0)/lp.length;
              document.getElementById('bands-stats').innerHTML='<table><tr><th>Metric</th><th>Value</th></tr>'+
                '<tr><td>Latest Year</td><td>'+latest+'</td></tr>'+
                '<tr><td>Avg Price</td><td>$'+latestAvg.toFixed(2)+'/kg</td></tr>'+
                '<tr><td>10th Pctl</td><td>$'+percentile(lp,0.1).toFixed(2)+'</td></tr>'+
                '<tr><td>Median</td><td>$'+percentile(lp,0.5).toFixed(2)+'</td></tr>'+
                '<tr><td>90th Pctl</td><td>$'+percentile(lp,0.9).toFixed(2)+'</td></tr>'+
                '<tr><td>Records</td><td>'+lp.length+'</td></tr></table>';
            } catch(e) { console.error('Bands error:',e); }
          }
          '''
            old_init='// Initialize'
            html=html.replace(old_init, bands_js+old_init, 1)
            # Add i18n keys for bands tab
            html=html.replace('tab_classes: \"V1 Classes\"', 'tab_classes: \"V1 Classes\", tab_bands: \"Historical Bands\", h_bands_detail: \"Price Band Statistics\"')
            html=html.replace('tab_classes: \"Classes V1\"', 'tab_classes: \"Classes V1\", tab_bands: \"Bandas Hist\u00f3ricas\", h_bands_detail: \"Estat\u00edsticas de Faixa de Pre\u00e7o\"')
            html=html.replace('tab_classes: \"Clases V1\"', 'tab_classes: \"Clases V1\", tab_bands: \"Bandas Hist\u00f3ricas\", h_bands_detail: \"Estad\u00edsticas de Banda de Precio\"')
            changed=True
            print('Historical Bands tab injected')

          # FIX 2: Replace price-class text input with select dropdown
          old_input='<input id=\"price-class\" placeholder=\"Livestock class filter...\" onchange=\"loadPrices()\">'
          new_input='<select id=\"price-class\" onchange=\"loadPrices()\"><option value=\"\">All Classes</option><option value=\"Weaner Steer\">Weaner Steer</option><option value=\"Weaner Heifer\">Weaner Heifer</option><option value=\"Yearling Steer\">Yearling Steer</option><option value=\"Yearling Heifer\">Yearling Heifer</option><option value=\"Feeder Steer\">Feeder Steer</option><option value=\"Feeder Heifer\">Feeder Heifer</option><option value=\"Finished Steer\">Finished Steer</option><option value=\"Finished Heifer\">Finished Heifer</option><option value=\"Cull Cow\">Cull Cow</option><option value=\"Bull\">Bull</option><option value=\"PTIC Heifer\">PTIC Heifer</option><option value=\"Heavy Steer\">Heavy Steer</option><option value=\"Boi Gordo\">Boi Gordo</option><option value=\"Novilho\">Novilho</option><option value=\"Novillo\">Novillo</option><option value=\"Vaca\">Vaca</option><option value=\"Ternero\">Ternero</option></select>'
          if old_input in html:
            html=html.replace(old_input, new_input, 1)
            changed=True
            print('Price class filter replaced with dropdown')

          # FIX 3: Make dynamic table headers use t() function in JS
          # Pulse table
          html=html.replace(
            \"'<table><tr><th>Country</th><th>Class</th><th>Region</th><th>USD/kg</th><th>Local/kg</th><th>Date</th></tr>'\",
            \"'<table><tr><th>'+t('col_country')+'</th><th>'+t('col_canonical')+'</th><th>Region</th><th>USD/kg</th><th>Local/kg</th><th>Date</th></tr>'\"
          )
          # Price table
          html=html.replace(
            \"'<table><tr><th>Date</th><th>Country</th><th>Region</th><th>Class</th><th>Weight</th><th>USD/kg</th><th>Local/kg</th><th>Source</th></tr>'\",
            \"'<table><tr><th>Date</th><th>'+t('col_country')+'</th><th>Region</th><th>'+t('col_canonical')+'</th><th>Weight</th><th>USD/kg</th><th>Local/kg</th><th>'+t('col_source')+'</th></tr>'\"
          )
          # Spread table
          html=html.replace(
            \"'<table><tr><th>Country</th><th>Source Class</th><th>Canonical</th><th>Stage</th><th>USD/kg</th><th>Local/kg</th><th>Currency</th><th>Date</th></tr>'\",
            \"'<table><tr><th>'+t('col_country')+'</th><th>'+t('col_source')+'</th><th>'+t('col_canonical')+'</th><th>'+t('col_stage')+'</th><th>USD/kg</th><th>Local/kg</th><th>Currency</th><th>Date</th></tr>'\"
          )
          # V1 Classes table
          old_v1=\"'<table><tr><th>Order</th><th>Class ID</th><th>Canonical Name</th><th>Species</th><th>Stage</th><th>Sex</th><th>Country</th><th>Local Name</th><th>Price Basis</th><th>Conv Factor</th><th>AE</th><th>Source</th></tr>'\"
          new_v1=\"'<table><tr><th>'+t('col_order')+'</th><th>'+t('col_classid')+'</th><th>'+t('col_canonical')+'</th><th>'+t('col_species')+'</th><th>'+t('col_stage')+'</th><th>'+t('col_sex')+'</th><th>'+t('col_country')+'</th><th>'+t('col_localname')+'</th><th>'+t('col_pricebasis')+'</th><th>'+t('col_conv')+'</th><th>'+t('col_ae')+'</th><th>'+t('col_source')+'</th></tr>'\"
          if old_v1 in html:
            html=html.replace(old_v1, new_v1, 1)
            changed=True
            print('V1 Classes table headers now use t()')
          # Herd table
          html=html.replace(
            \"'<table><tr><th>Class</th><th>Head</th><th>Avg Wt</th><th>Price/kg</th><th>Value/Head</th><th>Line Value</th><th>AE</th></tr>'\",
            \"'<table><tr><th>'+t('col_canonical')+'</th><th>Head</th><th>Avg Wt</th><th>Price/kg</th><th>Value/Head</th><th>Line Value</th><th>'+t('col_ae')+'</th></tr>'\"
          )
          if changed:
            print('i18n table headers updated')

          # Also add applyTranslations call after each load function
          # so tables get re-translated when switching language
          old_apply=\"document.querySelectorAll('[data-i18n]').forEach\"
          # Already handled by setLang calling applyTranslations

          with open('dashboard.html','w') as f: f.write(html)
          print('All fixes applied to dashboard.html')
          "

      - name: Fix tab mappings
        run: python3 fix_dashboard_tabs.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          git diff --cached --quiet && echo "No changes" || (git commit -m "Fix: Historical Bands tab, class filter dropdown, i18n table headers" && git push)
