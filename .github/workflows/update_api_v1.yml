name: Update API for V1

on:
  workflow_dispatch:

jobs:
  update_api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update canonical-classes query with V1 fields
        run: |
          sed -i 's/ORDER BY c.stage, c.canonical_name/ORDER BY c.lifecycle_order NULLS LAST, c.canonical_name/' intelligence_api.py
          sed -i '/a.dse_value$/a\               c.class_code, c.lifecycle_order, c.stage_code,\n               c.price_basis, c.default_weight_kg' intelligence_api.py
          sed -i '/"dse": float(r\[9\]) if r\[9\] else None}/s/}$/,\n         "class_code": r[10], "lifecycle_order": r[11],\n         "stage_code": r[12], "price_basis": r[13],\n         "default_weight_kg": float(r[14]) if r[14] else None}/' intelligence_api.py

      - name: Add display-config endpoint
        run: |
          cat >> intelligence_api.py << 'ENDPOINT1'

          @router.get("/display-config")
          def list_display_config(
              country: Optional[str] = Query(None, description="Filter by country code"),
          ):
              """List country display configuration."""
              conn = get_conn()
              cur = conn.cursor()
              cond = "WHERE 1=1"
              params = []
              if country:
                  cond += " AND country = %s"
                  params.append(country.upper())
              cur.execute(f"""
                  SELECT country, currency_code, currency_symbol, display_unit,
                         display_unit_label, kg_per_display_unit
                  FROM country_display_config {cond}
                  ORDER BY country
              """, params)
              rows = cur.fetchall()
              cur.close()
              conn.close()
              return [
                  {"country": r[0], "currency_code": r[1], "currency_symbol": r[2],
                   "display_unit": r[3], "display_unit_label": r[4],
                   "kg_per_display_unit": float(r[5]) if r[5] else None}
                  for r in rows
              ]
          ENDPOINT1

      - name: Add v1-classes endpoint
        run: |
          cat >> intelligence_api.py << 'ENDPOINT2'

          @router.get("/v1-classes")
          def v1_classes(
              country: Optional[str] = Query(None, description="Filter by country code"),
          ):
              """V1 canonical classes with local names and display config."""
              conn = get_conn()
              cur = conn.cursor()
              cond = "WHERE 1=1"
              params = []
              if country:
                  cond += " AND m.country = %s"
                  params.append(country.upper())
              cur.execute(f"""
                  SELECT c.class_code, c.canonical_name, c.species, c.stage, c.sex,
                         c.lifecycle_order, c.stage_code, c.price_basis,
                         c.default_weight_kg, c.ae_equivalent,
                         m.country, m.source_class AS local_name, m.data_source,
                         dc.currency_code, dc.currency_symbol, dc.display_unit,
                         dc.display_unit_label, dc.kg_per_display_unit
                  FROM canonical_livestock_classes c
                  JOIN livestock_class_mapping m ON m.canonical_class_id = c.id
                  LEFT JOIN country_display_config dc ON dc.country = m.country
                  {cond}
                  ORDER BY m.country, c.lifecycle_order NULLS LAST, c.canonical_name
              """, params)
              rows = cur.fetchall()
              cur.close()
              conn.close()
              return [
                  {"class_code": r[0], "canonical_name": r[1], "species": r[2],
                   "stage": r[3], "sex": r[4], "lifecycle_order": r[5],
                   "stage_code": r[6], "price_basis": r[7],
                   "default_weight_kg": float(r[8]) if r[8] else None,
                   "ae_equivalent": float(r[9]) if r[9] else None,
                   "country": r[10], "local_name": r[11], "data_source": r[12],
                   "currency_code": r[13], "currency_symbol": r[14],
                   "display_unit": r[15], "display_unit_label": r[16],
                   "kg_per_display_unit": float(r[17]) if r[17] else None}
                  for r in rows
              ]
          ENDPOINT2

      - name: Verify changes
        run: |
          grep -c "lifecycle_order" intelligence_api.py
          grep -c "display-config" intelligence_api.py
          grep -c "v1-classes" intelligence_api.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intelligence_api.py
          git diff --cached --quiet && echo "No changes" || (git commit -m "Add V1 fields to canonical-classes + display-config and v1-classes endpoints" && git push)
