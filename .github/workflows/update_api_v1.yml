name: Update API for V1

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix missing comma after a.dse_value
        run: |
          sed -i 's/a\.dse_value$/a.dse_value,/' intelligence_api.py
          echo "Fixed comma"

      - name: Verify syntax
        run: python3 -c "compile(open('intelligence_api.py').read(), 'intelligence_api.py', 'exec'); print('Syntax OK')"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intelligence_api.py
          git diff --cached --quiet && echo "No changes" || (git commit -m "Fix missing comma in canonical-classes SQL query" && git push)
