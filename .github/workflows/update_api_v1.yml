name: Update API for V1

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix column names class_code->class_id and default_weight_kg->conversion_factor
        run: |
          sed -i 's/c\.class_code/c.class_id/g' intelligence_api.py
          sed -i 's/c\.default_weight_kg/c.conversion_factor/g' intelligence_api.py
          sed -i 's/"class_code"/"class_id"/g' intelligence_api.py
          sed -i 's/"default_weight_kg"/"conversion_factor"/g' intelligence_api.py
          echo "Fixed column names"

      - name: Verify syntax
        run: python3 -c "compile(open('intelligence_api.py').read(), 'intelligence_api.py', 'exec'); print('Syntax OK')"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intelligence_api.py
          git diff --cached --quiet && echo "No changes" || (git commit -m "Fix column names: class_code->class_id, default_weight_kg->conversion_factor" && git push)
