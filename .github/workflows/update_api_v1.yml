name: Deploy V1 Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write V1 dashboard
        run: python3 write_dashboard.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          git diff --cached --quiet && echo "No changes" || (git commit -m "V1 responsive dashboard with mobile adaptation" && git push)
