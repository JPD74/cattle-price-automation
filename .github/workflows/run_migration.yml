name: Run Intelligence Engine Migration

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/run_migration.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install psycopg2-binary
      - name: Run class mappings fix
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python fix_class_mappings.py
      - name: Run farm profiles migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python migrate_farm_profiles.py
      - name: Seed cost benchmarks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python seed_cost_benchmarks.py
